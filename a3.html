    <!--Write a function 'FirstAndLast' that takes in an array, and returns an object with:
1) the first element of the array as the object's key, and
2) the last element of the array as that key's value. 
(Example input: ['ABC', 'DEF', 'Employee', 'Manager']  output: ABC : 'Manager')


Write a code to fetch the values of keys and print a sentence as “Hi!  We are students of semester 4 of CSE branch”.-->
</head>
<body>
    <script>
        const a = {
            "A" : "LJU",
            "B" : ["CSE", "IT" , "CE"],
            "C" : [
                {
                    "D" : "Hi",
                    "E" : ['are', 4, {'F' : ['semester', 'We']} ]
                }
            ],
            "G" : {
                "H" : "students",
                "I" : ["of","!"]
                },
            "J" : [{"K" :"Python", "L":"branch"},"FSD-2"]
        }
        document.write(a.C[0].D,a.G.I[1]+" "+a.C[0].E[2].F[1]+" "+a.C[0].E[0]+" "+a.G.H +" "+ a.G.I[0] +" "+ a.C[0].E[2].F[0]+" "+ a.C[0].E[1] +" "+a.G.I[0] +" "+a.B[0]+" "+a.J[0].L)
        </script>
        
</body>
